    <!--
      Preconnect / DNS-prefetch for Supabase. On a 300 ms+ cellular link
      the TLS handshake to *.supabase.co is the single biggest blocker
      before the dashboard can fetch any data; preconnect shaves an entire
      round trip. The HTML constant is replaced at build time by Vite from
      `import.meta.env.VITE_SUPABASE_URL`. If the env var is missing in a
      build (preview or production), Vite leaves the literal `%VITE_SUPABASE_URL%`
      in place — the browser silently ignores invalid `href` values, so
      this is safe to ship even when the env var isn't set.
    -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_SUPABASE_URL%" />

    <meta property="og:title" content="EquipQR | Free Work Order Software for Heavy Equipment Repair Shops" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://equipqr.app" />
    <!--
      NOTE: The Open Graph and Twitter social preview images intentionally use the
      canonical production domain (https://equipqr.app) even for preview deployments
      or custom domains. This ensures a single, stable social image URL for all
      environments and avoids broken previews on platforms that cache image URLs.
      Do not change these to be environment-dependent without updating this rationale.
    -->

    <meta property="og:image:height" content="630" />
