version: 2
updates:
  # Weekly dependency PRs; majors arrive as standalone PRs (default behavior).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    target-branch: preview

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: preview
