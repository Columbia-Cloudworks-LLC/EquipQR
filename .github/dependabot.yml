version: 2
updates:
  # Monthly dependency PRs (coarse delay buffer vs. immediate uptake of fresh releases).
  # Not publish-age enforcement — versions may still be newer than one week when PRs open.
  # schedule.day must be a lowercase weekday (monday..sunday). GitHub's dependabot-api
  # rejects integers here even when interval is monthly; weekday strings are the valid schema.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 15
    target-branch: preview
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    target-branch: preview
