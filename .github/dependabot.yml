version: 2
updates:
  # Monthly dependency PRs (coarse delay buffer vs. immediate uptake of fresh releases).
  # Not publish-age enforcement — versions may still be newer than one week when PRs open.
  # For interval: monthly, schedule.day is day-of-month (1–28), not a weekday name.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: 1
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 15
    target-branch: preview

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: 1
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    target-branch: preview
