name: "Copilot Setup Steps"

# Runs automatically when this file changes (validation), and on-demand from
# the Actions tab. When Copilot starts a session it executes this job first.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/load-1p-secrets/**
      - scripts/agent-bootstrap.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/load-1p-secrets/**
      - scripts/agent-bootstrap.sh

jobs:
  # MUST be named exactly `copilot-setup-steps` to be picked up by the agent.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Node / npm ──────────────────────────────────────────────────────────
      # Node 24 = current Active LTS (Oct 2025 → Oct 2027). Node 20 reached EOL April 2026.
      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit

      # ── 1Password secrets → .env files ──────────────────────────────────────
      # agent-bootstrap.sh installs the op CLI, renders .env and
      # supabase/functions/.env from the EquipQR Agents vault, and writes the
      # GCP viewer SA JSON used by the gcloud MCP.
      # The step is skipped gracefully when the token is absent (fork PRs, etc.)
      # Probe writes a non-sensitive boolean flag so the bootstrap if: guard can
      # use env context (secrets context is not resolvable in step if: by the
      # linter, though it is valid at runtime).
      - name: Probe OP token availability
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "HAS_OP_TOKEN=true" >> "$GITHUB_ENV"
          fi

      - name: Bootstrap secrets from 1Password
        if: env.HAS_OP_TOKEN == 'true'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: bash scripts/agent-bootstrap.sh
