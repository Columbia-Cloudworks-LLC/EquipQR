name: Secrets Drift Check

# Runs daily and on demand. Verifies that:
#   1. The OP service account token can read every required item in the EquipQR Agents vault.
#   2. Vercel and Supabase project secrets match the values stored in 1Password.
#
# Failure of (1) means: 1P items have been deleted, renamed, or the SA token
# has been revoked / expired. Failure of (2) means: production secrets have
# drifted from 1Password and need to be re-synced.
#
# This workflow is the canonical example of how to use the load-1p-secrets
# composite action.

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-1p-vault:
    name: 1Password vault accessibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      - name: Verify required EquipQR Agents items exist
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set +e
          # Datadog, Better Stack, and Figma items are intentionally absent here
          # (Datadog: skipped for cost; Better Stack + Figma: deferred). Add back to this
          # list when those credentials get minted.
          REQUIRED_ITEMS=(
            github-prod
            github-write
            gcp-viewer
            gcp-editor
            app-env-local-dev
            edge-env-local-dev
          )
          OP_VAULT='tgo2m6qbct5otqeqirjocn3joa'  # EquipQR Agents
          MISSING=()
          for item in "${REQUIRED_ITEMS[@]}"; do
            if op item get "$item" --vault "$OP_VAULT" --format json >/dev/null 2>&1; then
              echo "  OK   $item"
            else
              echo "  MISSING   $item"
              MISSING+=("$item")
            fi
          done
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo ""
            echo "::warning title=1Password drift::Missing items in EquipQR Agents vault: ${MISSING[*]}"
            echo "Some items may not yet have been minted — see plan Phase 1."
          fi
          # Drift is a warning, not a failure (Phase 1 may still be in progress).
          # Flip to `exit 1` once Phase 1 is fully complete.
          exit 0

  check-vercel-drift:
    name: Vercel env var drift
    runs-on: ubuntu-latest
    needs: check-1p-vault
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Vercel drift
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          # Phase 6 will add scripts/sync-vercel-from-1password.ps1 with --check
          # which is invoked here. Until that script exists, this job is a no-op.
          if [ -f scripts/sync-vercel-from-1password.ps1 ]; then
            pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-vercel-from-1password.ps1 -Check
          else
            echo "::notice::sync-vercel-from-1password.ps1 not yet present — skipping drift check."
          fi

  check-supabase-drift:
    name: Supabase secrets drift
    runs-on: ubuntu-latest
    needs: check-1p-vault
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Supabase drift (production)
        id: prod-drift
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: tgo2m6qbct5otqeqirjocn3joa
        continue-on-error: true
        run: |
          if [ -f scripts/sync-supabase-secrets-from-1password.ps1 ]; then
            bash scripts/ci/supabase-secrets-drift-preflight.sh \
              production \
              ymxkzronkhwxzcdcbnwq \
              supabase-access-token \
              edge-env-prod-secrets
          else
            echo "::notice::sync-supabase-secrets-from-1password.ps1 not yet present — skipping production drift check."
          fi

      - name: Check Supabase drift (preview)
        id: preview-drift
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: tgo2m6qbct5otqeqirjocn3joa
        continue-on-error: true
        run: |
          if [ -f scripts/sync-supabase-secrets-from-1password.ps1 ]; then
            bash scripts/ci/supabase-secrets-drift-preflight.sh \
              preview \
              olsdirkvvfegvclbpgrg \
              supabase-access-token \
              edge-env-preview-secrets
          else
            echo "::notice::sync-supabase-secrets-from-1password.ps1 not yet present — skipping preview drift check."
          fi

      - name: Fail if either project drifted
        run: |
          PROD='${{ steps.prod-drift.outcome }}'
          PREVIEW='${{ steps.preview-drift.outcome }}'
          echo "Production drift outcome: $PROD"
          echo "Preview drift outcome:    $PREVIEW"
          if [ "$PROD" != "success" ] || [ "$PREVIEW" != "success" ]; then
            echo "::error::Supabase secrets drift detected (prod=$PROD, preview=$PREVIEW). See preceding step logs."
            exit 1
          fi

  check-gh-env-drift:
    name: GitHub environment secrets drift
    runs-on: ubuntu-latest
    needs: check-1p-vault
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Load GitHub write token from 1Password
        uses: ./.github/actions/load-1p-secrets
        with:
          required: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: op://tgo2m6qbct5otqeqirjocn3joa/github-write/credential

      # Parse secrets-map.yml into a TSV before the step that holds the
      # OP token, so npx package execution never overlaps with secret access.
      - name: Parse secrets manifest
        run: |
          set -euo pipefail
          manifest_json="$(npx --yes js-yaml .github/secrets-map.yml)"
          node -e "const m=JSON.parse(process.argv[1]); for (const [env, cfg] of Object.entries(m.environments || {})) { for (const s of (cfg.secrets || [])) { console.log(env + '\t' + s.name + '\t' + s.op_ref); } }" "$manifest_json" \
            > "$RUNNER_TEMP/secrets-map.tsv"

      - name: Compare env secret timestamps with 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT: tgo2m6qbct5otqeqirjocn3joa
        run: |
          set -euo pipefail
          map_file="$RUNNER_TEMP/secrets-map.tsv"

          drift_count=0
          while IFS=$'\t' read -r gh_env secret_name op_ref; do
            [ -z "$gh_env" ] && continue

            gh_updated="$(gh api "/repos/${GITHUB_REPOSITORY}/environments/${gh_env}/secrets/${secret_name}" --jq '.updated_at' 2>/dev/null || true)"
            if [ -z "$gh_updated" ] || [ "$gh_updated" = "null" ]; then
              echo "::warning title=GitHub env drift::${gh_env}/${secret_name} is missing from GitHub environment."
              drift_count=$((drift_count + 1))
              continue
            fi

            op_path="${op_ref#op://}"
            op_item_path="${op_path#*/}"
            op_item="${op_item_path%%/*}"
            op_json="$(op item get "$op_item" --vault "$OP_VAULT" --format json 2>/dev/null || true)"
            if [ -z "$op_json" ]; then
              echo "::warning title=GitHub env drift::Unable to fetch 1Password item '${op_item}' (ref ${op_ref})."
              drift_count=$((drift_count + 1))
              continue
            fi

            op_updated="$(printf '%s' "$op_json" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j.updated_at || '');}catch(_){process.stdout.write('');}});")"
            if [ -z "$op_updated" ]; then
              echo "::warning title=GitHub env drift::Unable to read updated_at for 1Password item '${op_item}' (ref ${op_ref})."
              drift_count=$((drift_count + 1))
              continue
            fi

            gh_epoch="$(node -e "process.stdout.write(String(Date.parse(process.argv[1]) || 0));" "$gh_updated")"
            op_epoch="$(node -e "process.stdout.write(String(Date.parse(process.argv[1]) || 0));" "$op_updated")"
            if [ "$op_epoch" -gt "$gh_epoch" ]; then
              echo "::warning title=GitHub env drift::${gh_env}/${secret_name} is older than 1Password source (${op_item})."
              drift_count=$((drift_count + 1))
            fi
          done < "$map_file"

          echo "GitHub env drift warnings: $drift_count"
          exit 0
