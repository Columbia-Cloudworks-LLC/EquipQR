name: Repomix Artifact

on:
  push:
    branches: [ main, preview ]
  pull_request:
    branches: [ main, preview ]
  workflow_dispatch:

jobs:
  pack:
    name: Pack Repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Node 24 = current Active LTS (Oct 2025 → Oct 2027). Node 20 is EOL.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # Install runtime dependencies only; repomix reads source files and
      # doesn't require test/build-only devDependencies.
      - name: Install Dependencies
        run: npm ci --omit=dev --prefer-offline --no-audit

      # Run repomix directly via npx (uses repomix.config.json automatically)
      - name: Pack with Repomix
        run: npx --yes repomix

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: repomix-EquipQR.xml
          path: repomix-EquipQR.xml
          retention-days: 30
