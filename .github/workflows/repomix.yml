name: Repomix Artifact

on:
  push:
    branches: [ preview ]
  pull_request:
    branches: [ main, preview ]
  workflow_dispatch:

jobs:
  pack:
    name: Pack Repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Node 24 = current Active LTS (Oct 2025 → Oct 2027). Node 20 is EOL.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      # Install runtime dependencies only; repomix reads source files and
      # doesn't require test/build-only devDependencies.
      - name: Install Dependencies
        run: npm ci --omit=dev --prefer-offline --no-audit

      # Run repomix directly via npx (uses repomix.config.json automatically)
      - name: Pack with Repomix
        run: npx --yes repomix

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: repomix-EquipQR.xml
          path: repomix-EquipQR.xml
          retention-days: 30
