name: Preview Domain Alias

# Keeps preview.equipqr.app tracking the latest main (#1180).
#
# Vercel binds the preview.equipqr.app custom domain to git branch `preview`
# (a domain anchor — not an integration branch, see docs/ops/git-and-deploy.md).
# When a deployment is created for that branch, Vercel aliases the custom
# domain to it automatically (verified 2026-07-07: branch-bound domains need
# no `vercel alias set` step).
#
# Two things have to happen on every push to main, both verified empirically:
#
#   1. Fast-forward `preview` to main — the deploy hook builds whatever the
#      branch points at, so the ref must move first.
#   2. POST the project's `preview` deploy hook — a plain git push of a commit
#      Vercel already deployed for `main` is deduplicated and produces NO new
#      deployment, so the hook is the reliable build trigger.
#
# This workflow intentionally has no pull_request or deployment_status
# triggers: it is post-merge automation and must not attach (skipped) checks
# to PRs.

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  VERCEL_TEAM_ID: team_78VeGDURoofThjZNJOKEBpP5
  VERCEL_PROJECT: prj_P9hRun4B2OdGy8ACCnb0f7jNG6UA

jobs:
  sync-preview-branch:
    name: Sync preview branch and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Fast-forward preview branch to main
        run: |
          set -euo pipefail
          # `preview` is a pure domain-anchor mirror of main (never receives
          # direct commits), so a plain fast-forward push always succeeds and
          # also creates the branch when it does not exist yet. Guard against
          # accidental divergence with an explicit ancestry check instead of
          # force-pushing over unknown commits.
          if git ls-remote --exit-code --heads origin preview > /dev/null 2>&1; then
            git fetch origin preview
            if ! git merge-base --is-ancestor origin/preview HEAD; then
              echo "::error::Branch 'preview' has diverged from main. It is a domain anchor and must only mirror main — reset it manually (git push origin main:preview --force-with-lease) after confirming no work lives there."
              exit 1
            fi
          fi
          git push origin HEAD:refs/heads/preview
          echo "preview branch now points at $(git rev-parse HEAD)"

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71

      - name: Trigger Vercel deploy hook for preview branch
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          VERCEL_TOKEN="$(op read 'op://EquipQR Agents/vercel-write/VERCEL_TOKEN')"
          echo "::add-mask::$VERCEL_TOKEN"

          HOOK_URL="$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT?teamId=$VERCEL_TEAM_ID" \
            | jq -r '.link.deployHooks[] | select(.ref == "preview") | .url')"
          if [ -z "$HOOK_URL" ] || [ "$HOOK_URL" = "null" ]; then
            echo "::error::No Vercel deploy hook found for ref 'preview' on project $VERCEL_PROJECT. Create one in Vercel → Settings → Git → Deploy Hooks (name: preview, branch: preview)."
            exit 1
          fi
          echo "::add-mask::$HOOK_URL"

          TRIGGERED_AT_MS="$(date +%s%3N)"
          curl -sf -X POST "$HOOK_URL" > /dev/null
          echo "Deploy hook accepted; waiting for the preview-branch deployment to go READY..."

          DEADLINE=$(( $(date +%s) + 600 ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep 20
            DEPLOYMENT="$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT&teamId=$VERCEL_TEAM_ID&limit=10" \
              | jq -c --argjson since "$TRIGGERED_AT_MS" \
                '[.deployments[] | select(.meta.githubCommitRef == "preview" and .createdAt >= $since)] | first // empty')"
            if [ -z "$DEPLOYMENT" ]; then
              echo "No preview-branch deployment visible yet..."
              continue
            fi
            STATE="$(echo "$DEPLOYMENT" | jq -r '.state')"
            URL="$(echo "$DEPLOYMENT" | jq -r '.url')"
            echo "Deployment $URL state: $STATE"
            case "$STATE" in
              READY)
                echo "preview.equipqr.app now serves $URL (auto-aliased via branch-bound domain)."
                exit 0
                ;;
              ERROR|CANCELED)
                echo "::error::Preview-branch deployment $URL ended in state $STATE."
                exit 1
                ;;
            esac
          done
          echo "::error::Timed out after 10 minutes waiting for the preview-branch deployment to go READY."
          exit 1
