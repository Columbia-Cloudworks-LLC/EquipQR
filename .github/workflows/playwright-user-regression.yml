# Local-stack Playwright user regression (optional CI gate).
# Requires Docker for Supabase and network access for npm + Playwright browser install.
name: Playwright User Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'e2e/**'
      - 'playwright.user.config.ts'
      - 'scripts/run-user-regression.ps1'
      - 'src/**'
      - 'supabase/seeds/**'
      - '.github/workflows/playwright-user-regression.yml'

concurrency:
  group: playwright-user-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-local:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630cc966e2f884b5e5e140ea2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f444120048
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Start Supabase and Vite stack
        shell: pwsh
        run: |
          ./dev-start.bat
          $deadline = (Get-Date).AddMinutes(8)
          while ((Get-Date) -lt $deadline) {
            try {
              $app = Invoke-WebRequest -Uri http://localhost:8080 -UseBasicParsing -TimeoutSec 5
              $db = Invoke-WebRequest -Uri http://127.0.0.1:54321/rest/v1/ -UseBasicParsing -TimeoutSec 5
              if ($app.StatusCode -eq 200 -and $db.StatusCode -ge 200) { break }
            } catch { }
            Start-Sleep -Seconds 5
          }

      - name: Run full local Playwright regression
        shell: pwsh
        run: npm run test:e2e:local-full

      - name: Run mobile critical Playwright regression
        shell: pwsh
        run: npm run test:e2e:mobile-critical

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: tmp/playwright/report
          if-no-files-found: ignore
