name: Deploy to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify-deployment:
    name: Notify Deployment
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'

      - name: Get version from package.json (Windows)
        if: runner.os == 'Windows'
        id: version_win
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Host "‚ùå Missing version field in package.json"
            exit 1
          }
          # Validate version format (semver: x.y.z)
          if (-not ($version -match '^\d+\.\d+\.\d+$')) {
            Write-Host "‚ùå Invalid version format: $version"
            Write-Host "Version must match pattern: x.y.z (e.g., 1.0.0, 2.1.3)"
            exit 1
          }
          $tag = "v$version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Get version from package.json (Unix)
        if: runner.os != 'Windows'
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ] || [ "$VERSION" = "null" ]; then
            echo "‚ùå Missing version field in package.json"
            exit 1
          fi
          # Validate version format (semver: x.y.z)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "‚ùå Invalid version format: $VERSION"
            echo "Version must match pattern: x.y.z (e.g., 1.0.0, 2.1.3)"
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Deployment notification (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "üöÄ Deployment triggered for $env:GITHUB_REF_NAME branch"
          Write-Host "Version: ${{ steps.version_win.outputs.version }}"
          Write-Host "Environment: production"
          Write-Host "Vercel will handle the actual deployment automatically"
          Write-Host ""
          Write-Host "Expected URLs:"
          Write-Host "  Production: https://equipqr.app"
          Write-Host "  PR previews: per-PR Vercel URL; preview.equipqr.app aliases latest Preview deployment"

      - name: Deployment notification (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "üöÄ Deployment triggered for ${{ github.ref_name }} branch"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Environment: production"
          echo "Vercel will handle the actual deployment automatically"
          echo ""
          echo "Expected URLs:"
          echo "  Production: https://equipqr.app"
          echo "  PR previews: per-PR Vercel URL; preview.equipqr.app aliases latest Preview deployment"

