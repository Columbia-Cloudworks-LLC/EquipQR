name: Nightly Node Matrix

# Per-PR CI runs on Node 24.x only (Active LTS) for speed.
# This nightly job re-runs the test suite on the full supported matrix
# so we still catch regressions on Node 22.x (Maintenance LTS) without
# paying for it on every push.

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily ≈ 02:00 CDT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-matrix:
    name: Test Suite (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ matrix.node-version }}-nightly-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ matrix.node-version }}-nightly-

    - name: Install dependencies
      run: |
        set -e
        npm ci --prefer-offline --no-audit || (rm -f package-lock.json && npm install --package-lock-only --no-audit && npm ci --prefer-offline --no-audit)

    - name: Run full test suite with coverage
      run: npx vitest run --coverage
      env:
        CI: 'true'
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
