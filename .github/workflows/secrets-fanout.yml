name: Secrets Fan-Out (Non-Prod)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment source for secrets
        required: true
        type: choice
        options:
          - Preview
          - staging
          - copilot
      dry_run:
        description: Print actions only, do not mutate targets
        required: true
        type: boolean
        default: true
      targets:
        description: Downstream targets to update
        required: true
        type: choice
        default: both
        options:
          - vercel
          - supabase
          - both

permissions:
  contents: read

jobs:
  auth-probe:
    name: Auth Probe
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Vercel + Supabase credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is empty or missing."
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty or missing."
            exit 1
          fi
          npx --yes vercel teams ls --token "$VERCEL_TOKEN" >/dev/null
          echo "VERCEL_TOKEN OK"
          npx --yes supabase projects list --access-token "$SUPABASE_ACCESS_TOKEN" >/dev/null
          echo "SUPABASE_ACCESS_TOKEN OK"

  fanout-vercel:
    name: Fan-Out to Vercel Preview
    if: ${{ inputs.targets == 'vercel' || inputs.targets == 'both' }}
    needs: auth-probe
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync Vercel env vars
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_HCAPTCHA_SITEKEY: ${{ secrets.VITE_HCAPTCHA_SITEKEY }}
          VITE_SUPER_ADMIN_ORG_ID: ${{ secrets.VITE_SUPER_ADMIN_ORG_ID }}
          VITE_INTUIT_CLIENT_ID: ${{ secrets.VITE_INTUIT_CLIENT_ID }}
          VITE_GOOGLE_WORKSPACE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WORKSPACE_CLIENT_ID }}
          VITE_GOOGLE_PICKER_API_KEY: ${{ secrets.VITE_GOOGLE_PICKER_API_KEY }}
          VITE_GOOGLE_PICKER_APP_ID: ${{ secrets.VITE_GOOGLE_PICKER_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          SECRET_NAMES=(
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
            VITE_HCAPTCHA_SITEKEY
            VITE_SUPER_ADMIN_ORG_ID
            VITE_INTUIT_CLIENT_ID
            VITE_GOOGLE_WORKSPACE_CLIENT_ID
            VITE_GOOGLE_PICKER_API_KEY
            VITE_GOOGLE_PICKER_APP_ID
            VITE_GOOGLE_MAPS_API_KEY
            VITE_VAPID_PUBLIC_KEY
          )

          for name in "${SECRET_NAMES[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::${name} is empty in GitHub Environment '${{ inputs.environment }}' - skipping."
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN: would run vercel env add ${name} preview --force"
              continue
            fi

            printf "%s" "$value" | npx --yes vercel env add "$name" preview --scope team_78VeGDURoofThjZNJOKEBpP5 --token "$VERCEL_TOKEN" --force
            echo "SET: ${name}"
          done

  fanout-supabase:
    name: Fan-Out to Supabase Preview
    if: ${{ inputs.targets == 'supabase' || inputs.targets == 'both' }}
    needs: auth-probe
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync Supabase edge-function secrets
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HCAPTCHA_SECRET_KEY: ${{ secrets.HCAPTCHA_SECRET_KEY }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          KDF_SALT: ${{ secrets.KDF_SALT }}
          INTUIT_CLIENT_ID: ${{ secrets.INTUIT_CLIENT_ID }}
          INTUIT_CLIENT_SECRET: ${{ secrets.INTUIT_CLIENT_SECRET }}
          GOOGLE_WORKSPACE_CLIENT_ID: ${{ secrets.GOOGLE_WORKSPACE_CLIENT_ID }}
          GOOGLE_WORKSPACE_CLIENT_SECRET: ${{ secrets.GOOGLE_WORKSPACE_CLIENT_SECRET }}
          GOOGLE_MAPS_SERVER_KEY: ${{ secrets.GOOGLE_MAPS_SERVER_KEY }}
          GOOGLE_MAPS_BROWSER_KEY: ${{ secrets.GOOGLE_MAPS_BROWSER_KEY }}
          GOOGLE_MAPS_MAP_ID: ${{ secrets.GOOGLE_MAPS_MAP_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          SECRET_NAMES=(
            RESEND_API_KEY
            HCAPTCHA_SECRET_KEY
            TOKEN_ENCRYPTION_KEY
            KDF_SALT
            INTUIT_CLIENT_ID
            INTUIT_CLIENT_SECRET
            GOOGLE_WORKSPACE_CLIENT_ID
            GOOGLE_WORKSPACE_CLIENT_SECRET
            GOOGLE_MAPS_SERVER_KEY
            GOOGLE_MAPS_BROWSER_KEY
            GOOGLE_MAPS_MAP_ID
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
            VAPID_SUBJECT
            PRODUCTION_URL
          )

          for name in "${SECRET_NAMES[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::${name} is empty in GitHub Environment '${{ inputs.environment }}' - skipping."
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN: would run supabase secrets set ${name}=*** --project-ref olsdirkvvfegvclbpgrg"
              continue
            fi

            npx --yes supabase secrets set "${name}=${value}" --project-ref olsdirkvvfegvclbpgrg --access-token "$SUPABASE_ACCESS_TOKEN"
            echo "SET: ${name}"
          done
