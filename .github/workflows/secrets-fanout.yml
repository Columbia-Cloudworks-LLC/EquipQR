name: Secrets Fan-Out (Non-Prod)

on:
  # Digest-check preview Supabase secrets on main; production edge secrets are
  # check-only in secrets-drift-check.yml. Apply prod/preview edge secrets locally
  # via sync-supabase-secrets-from-1password.ps1 when rotating.
  schedule:
    - cron: '0 */6 * * *' # every 6 hours UTC
  push:
    branches:
      - main
    paths:
      - '.github/workflows/secrets-fanout.yml'
      - 'scripts/sync-supabase-secrets-from-1password.ps1'
      - '.github/actions/load-1p-secrets/**'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment for Vercel fan-out (Preview only)
        required: true
        type: choice
        options:
          - Preview
          - copilot
      dry_run:
        description: Print actions only, do not mutate targets
        required: true
        type: boolean
        default: true
      targets:
        description: Downstream targets to update
        required: true
        type: choice
        default: vercel
        options:
          - vercel
          - supabase
          - both

permissions:
  contents: read

concurrency:
  group: secrets-fanout-nonprod-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  auth-probe:
    name: Auth Probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI (Supabase auth)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Load Supabase token from 1Password
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        uses: ./.github/actions/load-1p-secrets
        with:
          required: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SUPABASE_ACCESS_TOKEN: op://tgo2m6qbct5otqeqirjocn3joa/supabase-write/SUPABASE_ACCESS_TOKEN

      - name: Verify Supabase credentials
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty after 1Password load."
            exit 1
          fi
          if [[ "${SUPABASE_ACCESS_TOKEN}" == op://* ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is still an op:// literal (OP_SERVICE_ACCOUNT_TOKEN missing or load failed)."
            exit 1
          fi
          npx --yes supabase projects list >/dev/null
          echo "SUPABASE_ACCESS_TOKEN OK (1Password supabase-write / SUPABASE_ACCESS_TOKEN)"

  fanout-vercel:
    name: Fan-Out to Vercel Preview
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.targets == 'vercel' || inputs.targets == 'both') }}
    needs: auth-probe
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Sync Vercel Preview env from 1Password
        if: ${{ inputs.dry_run != true }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-vercel-from-1password.ps1 -Environment preview

      - name: Dry-run Vercel Preview check
        if: ${{ inputs.dry_run == true }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-vercel-from-1password.ps1 -Check -Environment preview

  fanout-supabase-scheduled:
    name: Supabase secrets digest check (scheduled)
    if: ${{ github.event_name == 'schedule' }}
    needs: auth-probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Check production edge secrets drift
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -Check -OpItem edge-env-prod-secrets

  fanout-supabase-environment:
    name: Supabase secrets check (dispatch)
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
    needs: auth-probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Check Supabase edge secrets drift
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -Check -OpItem edge-env-prod-secrets
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -Check -OpItem edge-env-preview-secrets
