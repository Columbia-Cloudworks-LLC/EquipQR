name: Secrets Fan-Out (Non-Prod)

on:
  # Converge preview Supabase Edge Function secrets from 1Password without a git push
  # (1Password rotations do not emit GitHub events). Production remains check-only elsewhere.
  #
  # GitHub limitation: scheduled workflows are evaluated from the repository default branch
  # (`main`). This cron takes effect once this workflow file exists on `main` (for example
  # after a release promotion). Until then, use workflow_dispatch on `preview`, or rely on
  # the path-filtered `push` trigger below when this workflow or the sync script changes.
  schedule:
    - cron: '0 */6 * * *' # every 6 hours UTC
  push:
    branches:
      - preview
    paths:
      - '.github/workflows/secrets-fanout.yml'
      - 'scripts/sync-supabase-secrets-from-1password.ps1'
      - '.github/actions/load-1p-secrets/**'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment source for secrets
        required: true
        type: choice
        options:
          - Preview
          - staging
          - copilot
      dry_run:
        description: Print actions only, do not mutate targets
        required: true
        type: boolean
        default: true
      targets:
        description: Downstream targets to update
        required: true
        type: choice
        default: both
        options:
          - vercel
          - supabase
          - both

permissions:
  contents: read

concurrency:
  group: secrets-fanout-nonprod-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  auth-probe:
    name: Auth Probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI (Supabase auth)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Load Supabase token from 1Password
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        uses: ./.github/actions/load-1p-secrets
        with:
          required: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SUPABASE_ACCESS_TOKEN: op://tgo2m6qbct5otqeqirjocn3joa/supabase-write/SUPABASE_ACCESS_TOKEN

      - name: Verify Supabase credentials
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty after 1Password load."
            exit 1
          fi
          if [[ "${SUPABASE_ACCESS_TOKEN}" == op://* ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is still an op:// literal (OP_SERVICE_ACCOUNT_TOKEN missing or load failed)."
            exit 1
          fi
          npx --yes supabase projects list >/dev/null
          echo "SUPABASE_ACCESS_TOKEN OK (1Password supabase-write / SUPABASE_ACCESS_TOKEN)"

  fanout-vercel:
    name: Fan-Out to Vercel Preview
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.targets == 'vercel' || inputs.targets == 'both') }}
    needs: auth-probe
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Verify Vercel credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is empty or missing in GitHub Environment '${{ inputs.environment }}'."
            exit 1
          fi
          npx --yes vercel teams ls --token "$VERCEL_TOKEN" >/dev/null
          echo "VERCEL_TOKEN OK"

      - name: Sync Vercel env vars
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_HCAPTCHA_SITEKEY: ${{ secrets.VITE_HCAPTCHA_SITEKEY }}
          VITE_SUPER_ADMIN_ORG_ID: ${{ secrets.VITE_SUPER_ADMIN_ORG_ID }}
          VITE_INTUIT_CLIENT_ID: ${{ secrets.VITE_INTUIT_CLIENT_ID }}
          VITE_GOOGLE_WORKSPACE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WORKSPACE_CLIENT_ID }}
          VITE_GOOGLE_PICKER_API_KEY: ${{ secrets.VITE_GOOGLE_PICKER_API_KEY }}
          VITE_GOOGLE_PICKER_APP_ID: ${{ secrets.VITE_GOOGLE_PICKER_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          SECRET_NAMES=(
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
            VITE_HCAPTCHA_SITEKEY
            VITE_SUPER_ADMIN_ORG_ID
            VITE_INTUIT_CLIENT_ID
            VITE_GOOGLE_WORKSPACE_CLIENT_ID
            VITE_GOOGLE_PICKER_API_KEY
            VITE_GOOGLE_PICKER_APP_ID
            VITE_GOOGLE_MAPS_API_KEY
            VITE_VAPID_PUBLIC_KEY
          )

          for name in "${SECRET_NAMES[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::${name} is empty in GitHub Environment '${{ inputs.environment }}' - skipping."
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN: would run vercel env add ${name} preview --force"
              continue
            fi

            printf "%s" "$value" | npx --yes vercel env add "$name" preview --scope team_78VeGDURoofThjZNJOKEBpP5 --token "$VERCEL_TOKEN" --force
            echo "SET: ${name}"
          done

  fanout-supabase:
    name: Fan-Out to Supabase Preview
    if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'supabase' || inputs.targets == 'both')) }}
    needs: auth-probe
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4

      - name: Sync Supabase Edge secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "Automatic preview run (${{ github.event_name }}): applying Edge secrets from 1Password (edge-env-preview-secrets)"
            pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -OpItem edge-env-preview-secrets
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: digest check only (no Supabase mutations)"
            pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -Check -OpItem edge-env-preview-secrets
          else
            pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync-supabase-secrets-from-1password.ps1 -OpItem edge-env-preview-secrets
          fi
