name: Continuous Integration

on:
  pull_request:
    branches: [ main, preview ]
  push:
    branches: [ main, preview ]
    paths-ignore:
      - 'supabase/schema.sql' # Auto-generated by export-schema workflow
      - 'supabase/rls-policies.sql' # Auto-generated by export-schema workflow
      - '**/*.md'
      - 'docs/**'
      - '.github/**/*.md'
  workflow_dispatch:

permissions:
  # CodeQL init/analyze gathers workflow-run telemetry via the Actions API; without
  # this scope the run fails with "Resource not accessible by integration" on
  # GET /repos/.../actions/runs/{run_id} (see Security Scan job).
  actions: read
  contents: read
  security-events: write
  pull-requests: write
  checks: write

env:
  # Node 24.x LTS is the supported runtime (aligned with @types/node 24.x). See
  # https://nodejs.org/en/about/releases/ for the current release line status.
  NODE_VERSION: 24.x
  CACHE_VERSION: v3

jobs:
  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Verify release metadata against PR base (main)
      run: node scripts/verify-release-metadata.mjs
      env:
        RELEASE_METADATA_MODE: main
        RELEASE_METADATA_BASE_SHA: ${{ github.event.pull_request.base.sha }}

  preview-release-metadata:
    name: Preview Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.base_ref == 'preview'
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Verify Unreleased-only metadata against preview base
      run: node scripts/verify-release-metadata.mjs
      env:
        RELEASE_METADATA_MODE: preview
        RELEASE_METADATA_BASE_SHA: ${{ github.event.pull_request.base.sha }}

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Enforce npm usage (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if ((Test-Path "yarn.lock") -or (Test-Path "pnpm-lock.yaml")) {
          Write-Host "Detected non-npm lockfile. This project uses npm only."
          exit 1
        }

    - name: Enforce npm usage (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
          echo "Detected non-npm lockfile. This project uses npm only."
          exit 1
        fi

    - name: Install dependencies (with fallback) (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        try {
          npm ci --prefer-offline --no-audit
        } catch {
          if (Test-Path "package-lock.json") { Remove-Item "package-lock.json" -Force }
          npm install --package-lock-only --no-audit
          npm ci --prefer-offline --no-audit
        }

    - name: Install dependencies (with fallback) (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -e
        install_with_retry() {
          local max_attempts=3
          local attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "npm ci attempt $attempt/$max_attempts"
            if npm ci --prefer-offline --no-audit; then
              return 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              sleep $((attempt * 15))
            fi
            attempt=$((attempt + 1))
          done
          return 1
        }

        install_with_retry || (rm -f package-lock.json && npm install --package-lock-only --no-audit && install_with_retry)

    - name: Verify Node runtime and @types/node policy
      run: npm run verify:node-policy

    - name: Run ESLint
      run: npx eslint . --format=json --output-file=eslint-report.json
      continue-on-error: true

    - name: Annotate ESLint Results
      uses: ataylorme/eslint-annotate-action@5a8d8ab89a57679e90c32750e0f382e9d8570750
      if: always()
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        report-json: "eslint-report.json"

    - name: Run type check
      run: npx tsc --noEmit

  test:
    # Sharded test execution. Each shard runs roughly 1/N of the suite in
    # parallel. Per-shard Vitest also uses up to 2 file workers on Linux CI
    # (see vitest.config.ts; #1199). Coverage ratchet stays on the merged
    # report for every PR — do not defer floors to main-only.
    name: Test Suite (shard ${{ matrix.shard }}/${{ matrix.shard_total }})
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        shard_total: [4]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Cache Vite/SWC transform output
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          node_modules/.vite
          node_modules/.cache
        key: ${{ runner.os }}-vite-${{ env.CACHE_VERSION }}-${{ hashFiles('vite.config.ts', 'vitest.config.ts', 'package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-vite-${{ env.CACHE_VERSION }}-

    - name: Enforce npm usage
      shell: bash
      run: |
        if [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
          echo "Detected non-npm lockfile. This project uses npm only."
          exit 1
        fi

    - name: Install dependencies (with fallback)
      shell: bash
      run: |
        set -e
        npm ci --prefer-offline --no-audit || (rm -f package-lock.json && npm install --package-lock-only --no-audit && npm ci --prefer-offline --no-audit)

    - name: Run shard ${{ matrix.shard }}/${{ matrix.shard_total }}
      run: node scripts/test-ci-shard.mjs --shard=${{ matrix.shard }}/${{ matrix.shard_total }}
      env:
        CI: 'true'
        NODE_OPTIONS: '--max-old-space-size=4096'
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Upload Vitest results JSON
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: vitest-results-shard-${{ matrix.shard }}
        path: artifacts/vitest-results/shard-${{ matrix.shard }}.json
        retention-days: 14
        if-no-files-found: warn

    - name: Upload shard coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: coverage-shard-${{ matrix.shard }}
        path: |
          coverage/coverage-final.json
          coverage/coverage-summary.json
          coverage/lcov.info
        retention-days: 1
        if-no-files-found: error

  coverage-merge:
    name: Coverage Merge & Ratchet
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Install dependencies (with fallback)
      shell: bash
      run: |
        set -e
        npm ci --prefer-offline --no-audit || (rm -f package-lock.json && npm install --package-lock-only --no-audit && npm ci --prefer-offline --no-audit)

    - name: Download shard coverage artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        path: coverage-shards
        pattern: coverage-shard-*

    - name: Merge coverage
      run: node scripts/merge-coverage.mjs

    # Floors match vitest.config.ts coverage.thresholds.global (ratchet runs on merged shards).
    - name: Run coverage ratchet
      run: node scripts/coverage-ratchet.mjs

    - name: Upload merged coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload merged coverage artifact for PR report
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: coverage-report
        path: |
          coverage/coverage-summary.json
          coverage/coverage-final.json
        retention-days: 1

  # Posts coverage report as PR comment
  report-coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: coverage-merge
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Download coverage artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: coverage-report
        path: coverage

    - name: Post coverage report
      uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        json-summary-path: coverage/coverage-summary.json
        json-final-path: coverage/coverage-final.json
        vite-config-path: vitest.config.ts
        comment-on: pr

  security:
    name: Security Scan
    runs-on: ubuntu-latest  # Keep security scans on GitHub-hosted for isolation
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Enforce npm usage
      run: |
        if [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
          echo "Detected non-npm lockfile. This project uses npm only."
          exit 1
        fi

    - name: Install dependencies (with fallback)
      run: |
        set -e
        npm ci --prefer-offline --no-audit || (rm -f package-lock.json && npm install --package-lock-only --no-audit && npm ci --prefer-offline --no-audit)

    - name: Run enhanced security audit
      run: npx npm-audit-ci --moderate
      continue-on-error: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      with:
        languages: javascript
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      with:
        category: "/language:javascript"

  build:
    name: Build & Bundle Analysis
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: [lint-and-typecheck]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Cache Vite build output
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          node_modules/.vite
          node_modules/.cache
        key: ${{ runner.os }}-vite-build-${{ env.CACHE_VERSION }}-${{ hashFiles('vite.config.ts', 'package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-vite-build-${{ env.CACHE_VERSION }}-

    - name: Enforce npm usage (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if ((Test-Path "yarn.lock") -or (Test-Path "pnpm-lock.yaml")) {
          Write-Host "Detected non-npm lockfile. This project uses npm only."
          exit 1
        }

    - name: Enforce npm usage (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
          echo "Detected non-npm lockfile. This project uses npm only."
          exit 1
        fi

    - name: Install dependencies (with fallback) (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        try {
          npm ci --prefer-offline --no-audit
        } catch {
          if (Test-Path "package-lock.json") { Remove-Item "package-lock.json" -Force }
          npm install --package-lock-only --no-audit
          npm ci --prefer-offline --no-audit
        }

    - name: Install dependencies (with fallback) (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -e
        install_with_retry() {
          local max_attempts=3
          local attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "npm ci attempt $attempt/$max_attempts"
            if npm ci --prefer-offline --no-audit; then
              return 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              sleep $((attempt * 15))
            fi
            attempt=$((attempt + 1))
          done
          return 1
        }

        install_with_retry || (rm -f package-lock.json && npm install --package-lock-only --no-audit && install_with_retry)

    - name: Cache build output
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: dist
        key: ${{ runner.os }}-build-${{ github.sha }}

    - name: Read app version from package.json (Windows)
      if: runner.os == 'Windows'
      id: ver_win
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $pkg = Get-Content package.json | ConvertFrom-Json
        $appVersion = $pkg.version
        if ([string]::IsNullOrWhiteSpace($appVersion)) {
          Write-Host "❌ Missing version field in package.json"
          exit 1
        }
        # Validate version format (semver: x.y.z)
        if (-not ($appVersion -match '^\d+\.\d+\.\d+$')) {
          Write-Host "❌ Invalid version format: $appVersion"
          Write-Host "Version must match pattern: x.y.z (e.g., 1.0.0, 2.1.3)"
          exit 1
        }
        "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "📊 Version Information:"
        Write-Host "  App version (from package.json): $appVersion"

    - name: Read app version from package.json (Unix)
      if: runner.os != 'Windows'
      id: ver
      shell: bash
      run: |
        APP_VERSION=$(node -p "require('./package.json').version")
        if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "undefined" ] || [ "$APP_VERSION" = "null" ]; then
          echo "❌ Missing version field in package.json"
          exit 1
        fi
        # Validate version format (semver: x.y.z)
        if ! [[ "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid version format: $APP_VERSION"
          echo "Version must match pattern: x.y.z (e.g., 1.0.0, 2.1.3)"
          exit 1
        fi
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT
        echo "📊 Version Information:"
        echo "  App version (from package.json): $APP_VERSION"

    - name: Export public env for Vite (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        "VITE_APP_VERSION=$env:APP_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Export public env for Vite (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: echo "VITE_APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

    - name: Build application
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}

    - name: Verify SPA routing contract
      run: npm run verify:spa-routing

    - name: Analyze bundle size
      run: npx size-limit --json || echo "Size limit check completed with warnings"
      continue-on-error: true
      timeout-minutes: 5

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: build-files
        path: dist/
        retention-days: 7

  quality-gates:
    name: Quality Gates
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    needs: [coverage-merge, security, build]
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

    - name: Enforce npm usage (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if ((Test-Path "yarn.lock") -or (Test-Path "pnpm-lock.yaml")) {
          Write-Host "Detected non-npm lockfile. This project uses npm only."
          exit 1
        }

    - name: Enforce npm usage (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ -f "yarn.lock" ] || [ -f "pnpm-lock.yaml" ]; then
          echo "Detected non-npm lockfile. This project uses npm only."
          exit 1
        fi

    - name: Install dependencies (with fallback) (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        try {
          npm ci --prefer-offline --no-audit
        } catch {
          if (Test-Path "package-lock.json") { Remove-Item "package-lock.json" -Force }
          npm install --package-lock-only --no-audit
          npm ci --prefer-offline --no-audit
        }

    - name: Install dependencies (with fallback) (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -e
        npm ci --prefer-offline --no-audit || (rm -f package-lock.json && npm install --package-lock-only --no-audit && npm ci --prefer-offline --no-audit)

    - name: Restore build cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: dist
        key: ${{ runner.os }}-build-${{ github.sha }}

    # Note: Test coverage is already validated in the Coverage Merge job.
    # Quality Gates validates build artifacts and bundle sizes only.

    - name: Check bundle size limits (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (-not (Test-Path "dist")) {
          Write-Host "Build directory not found, running build..."
          npm run build
        }
        $buildSize = (Get-ChildItem -Path dist -Recurse -File | Measure-Object -Property Length -Sum).Sum
        $maxSize = 12MB
        Write-Host "Build size: {0:N2}MB" -f ($buildSize/1MB)
        Write-Host "Maximum allowed: 12MB"
        if ($buildSize -gt $maxSize) {
          Write-Host "❌ Build size {0:N2}MB exceeds maximum of 12MB" -f ($buildSize/1MB)
          Write-Host "Large files in build (>1MB):"
          Get-ChildItem -Path dist -Recurse -File | Where-Object { $_.Length -gt 1MB } | Sort-Object Length -Descending | Select-Object -First 10 | ForEach-Object { "{0:N2}MB `t {1}" -f ($_.Length/1MB), $_.FullName }
          exit 1
        }
        Write-Host "✅ Build size within limits!"

    - name: Check bundle size limits (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ ! -d "dist" ]; then
          echo "Build directory not found, running build..."
          npm run build
        fi

        build_size=$(du -sb dist/ | cut -f1)
        max_size=$((12 * 1024 * 1024)) # 12MB in bytes

        echo "Build size: $(($build_size / 1024 / 1024))MB"
        echo "Maximum allowed: $(($max_size / 1024 / 1024))MB"

        if [ $build_size -gt $max_size ]; then
          echo "❌ Build size $(($build_size / 1024 / 1024))MB exceeds maximum of $(($max_size / 1024 / 1024))MB"
          echo "Large files in build:"
          find dist/ -type f -size +1M -exec du -sh {} \; | sort -hr | head -10
          exit 1
        fi
        echo "✅ Build size within limits!"
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Performance budget check (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "📊 Performance Analysis:"
        Write-Host "JavaScript bundles:"
        Get-ChildItem dist/assets -Filter *.js -Recurse | Sort-Object Length -Descending | Select-Object -First 5 | ForEach-Object { "{0:N2}MB `t {1}" -f ($_.Length/1MB), $_.FullName }
        Write-Host "CSS bundles:"
        Get-ChildItem dist/assets -Filter *.css -Recurse | Sort-Object Length -Descending | Select-Object -First 3 | ForEach-Object { "{0:N2}MB `t {1}" -f ($_.Length/1MB), $_.FullName }
        Write-Host "Images:"
        $imgCount = (Get-ChildItem dist -Include *.png,*.jpg,*.svg -Recurse -File | Measure-Object).Count
        Write-Host "Image count: $imgCount"

    - name: Performance budget check (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "📊 Performance Analysis:"
        echo "JavaScript bundles:"
        find dist/assets -name "*.js" -exec du -sh {} \; | sort -hr | awk 'NR<=5'
        echo "CSS bundles:"
        find dist/assets -name "*.css" -exec du -sh {} \; | sort -hr | awk 'NR<=3'
        echo "Images:"
        find dist -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.svg" \) | wc -l | xargs echo "Image count:"

    - name: Check gzipped JS bundle sizes (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (-not (Test-Path "dist")) {
          Write-Host "Build directory not found, running build..."
          npm run build
        }
        Write-Host "📦 Checking gzipped JavaScript bundle sizes:"
        $maxGzipSize = 512000
        $failed = $false
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        function Get-GzipSizeBytes([string]$filePath) {
          $bytes = [System.IO.File]::ReadAllBytes($filePath)
          $outStream = New-Object System.IO.MemoryStream
          $gzip = New-Object System.IO.Compression.GZipStream($outStream, [System.IO.Compression.CompressionLevel]::Optimal)
          $gzip.Write($bytes, 0, $bytes.Length)
          $gzip.Dispose()
          $size = $outStream.Length
          $outStream.Dispose()
          return [int]$size
        }
        Get-ChildItem dist/assets -Filter *.js -File | ForEach-Object {
          $gzipSize = Get-GzipSizeBytes $_.FullName
          $sizeKB = [math]::Floor($gzipSize / 1024)
          Write-Host "  $($_.Name): ${sizeKB}KB (gzipped)"
          if ($gzipSize -gt $maxGzipSize) {
            Write-Host "::error file=$($_.FullName)::Gzipped JS bundle $($_.Name) (${sizeKB}KB) exceeds 500KB limit"
            $failed = $true
          }
        }
        if ($failed) {
          Write-Host "❌ One or more JS bundles exceed the 500KB gzipped size limit"
          exit 1
        }
        Write-Host "✅ All JS bundles within 500KB gzipped limit"

    - name: Check gzipped JS bundle sizes (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ ! -d "dist" ]; then
          echo "Build directory not found, running build..."
          npm run build
        fi

        echo "📦 Checking gzipped JavaScript bundle sizes:"
        max_gzip_size=512000 # 500KB in bytes
        failed=false

        for js_file in dist/assets/*.js; do
          if [ -f "$js_file" ]; then
            gzip_size=$(gzip -c "$js_file" | wc -c)
            size_kb=$((gzip_size / 1024))
            filename=$(basename "$js_file")

            echo "  $filename: ${size_kb}KB (gzipped)"

            if [ $gzip_size -gt $max_gzip_size ]; then
              echo "::error file=$js_file::Gzipped JS bundle $filename (${size_kb}KB) exceeds 500KB limit"
              failed=true
            fi
          fi
        done

        if [ "$failed" = true ]; then
          echo "❌ One or more JS bundles exceed the 500KB gzipped size limit"
          exit 1
        fi
        echo "✅ All JS bundles within 500KB gzipped limit"
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Success notification
      run: |
        echo "🎉 All quality gates passed!"
        echo "✅ Linting and type checking passed"
        echo "✅ All tests passed with sufficient coverage"
        echo "✅ Security scan completed"
        echo "✅ Build completed successfully"
        echo "✅ Bundle size within limits"
