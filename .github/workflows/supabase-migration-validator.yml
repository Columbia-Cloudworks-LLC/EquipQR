name: Supabase Migration Validator

on:
  pull_request:
    paths:
      - 'supabase/**'
  push:
    branches:
      - main
    paths:
      - 'supabase/**'

jobs:
  validate-migrations:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get changed migration files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Handle first push with no base
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files 'supabase/migrations/*.sql')
          else
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- 'supabase/migrations/*.sql' 2>/dev/null || git ls-files 'supabase/migrations/*.sql')
          fi

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Changed migration files:"
          echo "$CHANGED"

      - name: Run migration validator
        run: node .github/scripts/validate-migrations.js
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
