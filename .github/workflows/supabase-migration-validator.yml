name: Supabase Migration Validator

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/scripts/validate-migrations.js'
      - '.github/workflows/supabase-migration-validator.yml'
      - 'scripts/check-schema-reference.mjs'

jobs:
  validate-migrations:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'

      - name: Get changed migration files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          GATE_FILES_CHANGED=false
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "$BASE_SHA" HEAD | grep -qE '^\.github/scripts/validate-migrations\.js$|^\.github/workflows/supabase-migration-validator\.yml$'; then
              GATE_FILES_CHANGED=true
            fi
          fi

          # Validator / workflow edits must exercise the gate against the full migration set.
          if [ "$GATE_FILES_CHANGED" = true ]; then
            CHANGED=$(git ls-files 'supabase/migrations/*.sql')
          elif [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files 'supabase/migrations/*.sql')
          else
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- 'supabase/migrations/*.sql' 2>/dev/null || git ls-files 'supabase/migrations/*.sql')
          fi

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Changed migration files:"
          echo "$CHANGED"

      - name: Run migration validator
        run: node .github/scripts/validate-migrations.js
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}

      # supabase/current_schema.sql is a derived dump of the migration chain
      # (#1182). Schema-affecting migration changes must regenerate it in the
      # same PR. Git-based, no DB spin-up; PRs without migration changes pass
      # trivially.
      - name: Check schema reference freshness
        if: github.event_name == 'pull_request'
        run: node scripts/check-schema-reference.mjs
        env:
          SCHEMA_REFERENCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
